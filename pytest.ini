[pytest]
# Specify where pytest should look for tests
testpaths = tests

# Python files to consider as test modules
python_files = test_*.py *_test.py

# Test classes to discover
python_classes = Test*

# Test functions to discover
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Add options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for organizing tests
markers =
    unit: unit tests
    integration: integration tests
    slow: slow running tests